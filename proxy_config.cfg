global
    tune.bufsize 4096
    maxconn 27500
    spread-checks 5

    # --- LOGGING DIAKTIFKAN: kirim log ke stdout ---
    log stdout format raw local0

    ssl-server-verify none

defaults
    mode tcp
    timeout client 10s
    timeout server 10s
    timeout connect 5s
    timeout client-fin 5s
    timeout server-fin 5s

    # --- LOGGING DIAKTIFKAN ---
    log global
    option tcplog

    default-server inter 10s fastinter 1s downinter 3s error-limit 50

listen stats
    bind :::8199
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats uri /

# ==========================================
# GHOSTING MODE: FORCE "TERPUTUS"
# ==========================================

frontend haproxy_v4_http
    maxconn 27495
    #PUBLIC_IP
    bind ipv4@*:80
    bind ipv4@*:8080 accept-proxy
    tcp-request connection reject

frontend haproxy_v4_https
    maxconn 27495
    #PUBLIC_IP
    bind ipv4@*:443 ssl crt /etc/haproxy/ssl/proxy.whatsapp.net.pem
    bind ipv4@*:8443 ssl crt /etc/haproxy/ssl/proxy.whatsapp.net.pem accept-proxy
    tcp-request connection reject

frontend haproxy_v4_xmpp
    maxconn 27495
    #PUBLIC_IP
    bind ipv4@*:5222
    bind ipv4@*:8222 accept-proxy
    tcp-request connection reject

frontend haproxy_v4_whatsapp_net
    maxconn 27495
    #PUBLIC_IP
    bind ipv4@*:587
    bind ipv4@*:7777
    tcp-request connection reject

backend wa_whatsapp_net
    mode tcp

backend wa
    mode tcp

backend wa_http
    mode tcp
